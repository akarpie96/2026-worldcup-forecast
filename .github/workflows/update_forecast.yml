name: Update World Cup Forecast

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  update-forecast:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run forecast pipeline
        run: python run_pipeline.py

      - name: Commit updated forecast files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/raw/espn_2026_scoreboard.json
          git add data/processed/*.csv
          git commit -m "Update World Cup forecast" || echo "No changes to commit"
          git push